name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'marketing/**'
      - 'docker-compose.prod.yml'
      - 'Caddyfile'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ccn-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ccn-api:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Allow runner IP in EC2 security group
        id: sg
        run: |
          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com)
          echo "runner_ip=${RUNNER_IP}" >> $GITHUB_OUTPUT
          aws ec2 authorize-security-group-ingress \
            --group-id sg-06f3d7ce56710cd48 \
            --protocol tcp --port 22 \
            --cidr ${RUNNER_IP}/32 || true

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          EC2_IP: ${{ secrets.EC2_IP }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH_KEY_PATH=/tmp/deploy_key EC2_IP=$EC2_IP DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME bash scripts/deploy.sh
          rm -f /tmp/deploy_key

      - name: Revoke runner IP from security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id sg-06f3d7ce56710cd48 \
            --protocol tcp --port 22 \
            --cidr ${{ steps.sg.outputs.runner_ip }}/32 || true
