services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.production
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - uploads:/app/uploads

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node dist/worker.js
    env_file: .env.production
    restart: always

volumes:
  uploads:
